category: feature_flags
rules:
  - id: FF_FLAG_KEY_LITERAL
    title: "Feature flag key literal detected"
    severity: low
    confidence: medium
    matcher:
      type: regex
      pattern: "(?<!<)\\b((?i:featureFlag|flag|toggle|experiment))\\b[^\\n,{}<]{0,40}[.([:=]\\s*['\"]([A-Za-z0-9][A-Za-z0-9_.-]{2,39})['\"]"
      capture_group: 2
      capture_as: flag_key
    extract:
      fields:
        flag_key: { from_capture: flag_key }
    evidence:
      snippet_from: normalized