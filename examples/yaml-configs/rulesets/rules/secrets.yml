category: secrets
rules:
  - id: SEC_AUTH_HEADER_BEARER
    title: "Bearer token assigned to Authorization header"
    severity: high
    confidence: high
    matcher:
      type: semantic
      logic:
        any:
          - and:
              - ast:
                  kind: AssignmentExpression
                  left_matches:
                    any_of:
                      - "headers.Authorization"
                      - "config.headers.Authorization"
              - regex_on_right:
                  pattern: "(?i)^Bearer\\s+[A-Za-z0-9\\-\\._~\\+\\/]+=*$"
                  capture_as: token
    extract:
      fields:
        secret_type: { static: "bearer_token" }
        secret_value: { from_capture: token, mask: "keep_prefix_6_suffix_4" }
    evidence:
      snippet_from: raw
      include_ast_path: true

  - id: SEC_GENERIC_API_KEY_LITERAL
    title: "Suspicious hardcoded API key literal"
    severity: high
    confidence: medium
    matcher:
      type: ast_pattern
      pattern:
        kind: VariableDeclarator
        id_name_regex: "(?i)(api[_-]?key|secret|token|auth|private)"
        init:
          type: LiteralString
          regex: "^[A-Za-z0-9_\\-]{24,}$"
          capture_as: key
    extract:
      fields:
        secret_type: { static: "generic_key" }
        secret_value: { from_capture: key, mask: "keep_prefix_4_suffix_4" }
    evidence:
      snippet_from: normalized

  - id: SEC_AUTH_HEADER_SETTER
    title: "Bearer token passed to headers.set"
    severity: high
    confidence: high
    matcher:
      type: semantic
      logic:
        any:
          - and:
              - ast:
                  kind: CallExpression
                  callee_any_of:
                    - "headers.set"
              - regex_on_arg:
                  index: 0
                  pattern: "(?i)^Authorization$"
              - regex_on_arg:
                  index: 1
                  pattern: "(?i)^Bearer\\s+[A-Za-z0-9\\-\\._~\\+\\/]+=*$"
                  capture_as: token
    extract:
      fields:
        secret_type: { static: "bearer_token" }
        secret_value: { from_capture: token, mask: "keep_prefix_6_suffix_4" }
    evidence:
      snippet_from: raw
      include_ast_path: true

  - id: SEC_FETCH_AUTH_OPTION
    title: "Bearer token passed inside fetch options headers"
    severity: high
    confidence: high
    matcher:
      type: semantic
      logic:
        any:
          - and:
              - ast:
                  kind: CallExpression
                  callee_any_of:
                    - "fetch"
              - regex_on_object_arg_property:
                  index: 1
                  path: "headers.Authorization"
                  pattern: "(?i)^Bearer\\s+[A-Za-z0-9\\-\\._~\\+\\/]+=*$"
                  capture_as: token
    extract:
      fields:
        secret_type: { static: "bearer_token" }
        secret_value: { from_capture: token, mask: "keep_prefix_6_suffix_4" }
    evidence:
      snippet_from: raw
      include_ast_path: true
