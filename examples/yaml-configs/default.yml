# BundleInspector reference configuration.
# This mirrors the real Config schema (bundleInspector.config.Config) so it loads without error via
# `Config.from_file(...)`. Unknown or legacy fields are rejected by the strict schema.

scope:
  allowed_domains:
    - "example.com"
    - "*.example.com"
  denied_domains:
    - "analytics.example"
  include_subdomains: true
  allowed_paths:
    - "/"
  denied_paths:
    - ".*\\.map$"
  third_party_policy: "tag_only"   # analyze | skip | tag_only
  allow_private_ips: false

crawler:
  max_depth: 2
  max_pages: 50
  max_js_files: 200
  rate_limit: 0.0
  max_concurrent: 5
  request_timeout: 20.0
  page_timeout: 30.0
  follow_redirects: true
  use_headless: true
  explore_routes: true
  max_route_exploration: 15
  interactive_clicking: false
  block_state_changing_requests: true
  max_retries: 2
  retry_delay: 1.0
  max_file_size: 10485760          # 10 MiB
  user_agent: "bundleInspector/1.0"

parser:
  tolerant: true
  partial_on_error: true
  extract_strings: true
  extract_calls: true
  extract_imports: true
  build_call_graph: true
  beautify: true
  resolve_sourcemaps: true
  beautify_max_bytes: 1000000
  analysis_worker_timeout: 30.0

rules:
  enabled_categories:
    - endpoint
    - secret
    - domain
    - flag
    - debug
    - sink
    - upload
  min_confidence: "low"            # low | medium | high
  mask_secrets: true
  secret_visible_chars: 4
  entropy_threshold: 4.0
  extract_headers: true
  extract_parameters: true
  dormant_endpoint_detection_enabled: true
  runtime_endpoint_surfacing_enabled: true

output:
  format: "json"                   # json | html | sarif
  include_raw_content: false
  include_ast: false
  include_snippets: true
  snippet_context_lines: 3
  min_severity: "info"             # info | low | medium | high
  min_risk_tier: "P3"              # P0 | P1 | P2 | P3
