# Fast remote web-scan profile.
# Goal: reduce local normalization time on large bundles when speed matters
# more than normalized/source-map fidelity.

scope:
  include_subdomains: true
  third_party_policy: skip

crawler:
  max_depth: 1
  max_pages: 15
  max_js_files: 180
  rate_limit: 1.5
  max_concurrent: 3
  request_timeout: 20.0
  page_timeout: 20.0
  max_redirects: 5
  follow_redirects: true
  use_headless: false
  headless_wait_time: 1.0
  explore_routes: false
  max_route_exploration: 0
  max_retries: 1
  retry_delay: 1.0

parser:
  tolerant: true
  partial_on_error: true
  beautify: false
  resolve_sourcemaps: false

rules:
  min_confidence: medium
  mask_secrets: true

output:
  format: html
  output_dir: artifacts/fast
  include_raw_content: false

resume: true
